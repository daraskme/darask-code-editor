name: Publish beta

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows beta
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate

      - name: Build frontend
        run: npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Lint Rust
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test --locked

      - name: Verify tag and application version
        run: |
          $tauriVersion = (Get-Content -Raw src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $packageVersion = (Get-Content -Raw package.json | ConvertFrom-Json).version
          if ($tauriVersion -ne $packageVersion) {
            throw "package.json ($packageVersion) and tauri.conf.json ($tauriVersion) must match."
          }
          if ("v$tauriVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} must match application version v$tauriVersion."
          }

      - name: Build and publish NSIS installer
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Darask Code ${{ github.ref_name }}
          releaseBody: |
            ## ベータ版

            Windows x64 向けのテストリリースです。NSIS インストーラーまたはポータブル EXE を利用できます。

            このビルドはコード署名されていません。Windows SmartScreen の警告が出ることがあるため、公式の GitHub Releases からのみ取得してください。
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          args: --bundles nsis

      - name: Name portable executable for release
        run: >-
          Copy-Item "src-tauri/target/release/darask.exe"
          "src-tauri/target/release/Darask-Code-${{ github.ref_name }}-windows-x64-portable.exe"

      - name: Upload portable executable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload "${{ github.ref_name }}"
          "src-tauri/target/release/Darask-Code-${{ github.ref_name }}-windows-x64-portable.exe"
          --clobber

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darask-${{ github.ref_name }}-windows-x64
          path: |
            src-tauri/target/release/Darask-Code-${{ github.ref_name }}-windows-x64-portable.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
